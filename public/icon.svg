<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1a12"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="#00ff88" stroke-width="1" opacity="0.04"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="#00ff88" stroke-width="1" opacity="0.04"/>
  <line x1="0" y1="342" x2="512" y2="342" stroke="#00ff88" stroke-width="1" opacity="0.04"/>

  <!-- Area fill under chart -->
  <polygon
    points="72,380 150,295 218,330 300,200 378,235 440,148 440,400 72,400"
    fill="#00ff88"
    opacity="0.04"
  />

  <!-- Chart line -->
  <polyline
    points="72,380 150,295 218,330 300,200 378,235 440,148"
    fill="none"
    stroke="url(#chartLine)"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Candlestick bars — left cluster (muted) -->
  <rect x="88" y="310" width="28" height="70" rx="4" fill="#00ff88" opacity="0.15"/>
  <line x1="102" y1="300" x2="102" y2="315" stroke="#00ff88" stroke-width="6" stroke-linecap="round" opacity="0.15"/>
  <line x1="102" y1="380" x2="102" y2="395" stroke="#00ff88" stroke-width="6" stroke-linecap="round" opacity="0.15"/>

  <rect x="148" y="270" width="28" height="60" rx="4" fill="#1a1a1a" opacity="0.6"/>
  <rect x="148" y="270" width="28" height="60" rx="4" fill="#ff4444" opacity="0.18"/>
  <line x1="162" y1="258" x2="162" y2="274" stroke="#ff4444" stroke-width="6" stroke-linecap="round" opacity="0.2"/>
  <line x1="162" y1="330" x2="162" y2="345" stroke="#ff4444" stroke-width="6" stroke-linecap="round" opacity="0.2"/>

  <!-- Candlestick bars — right cluster (bright, focal) -->
  <rect x="284" y="168" width="34" height="72" rx="5" fill="#00ff88" opacity="0.22"/>
  <line x1="301" y1="155" x2="301" y2="172" stroke="#00ff88" stroke-width="7" stroke-linecap="round" opacity="0.3"/>
  <line x1="301" y1="240" x2="301" y2="256" stroke="#00ff88" stroke-width="7" stroke-linecap="round" opacity="0.3"/>

  <rect x="352" y="136" width="34" height="68" rx="5" fill="#00ff88" filter="url(#glow)" opacity="0.9"/>
  <line x1="369" y1="114" x2="369" y2="140" stroke="#00ff88" stroke-width="7" stroke-linecap="round"/>
  <line x1="369" y1="204" x2="369" y2="226" stroke="#00ff88" stroke-width="7" stroke-linecap="round"/>

  <!-- Glowing dot at chart peak -->
  <circle cx="440" cy="148" r="14" fill="#00ff88" filter="url(#glow)" opacity="0.9"/>
  <circle cx="440" cy="148" r="7" fill="#fff" opacity="0.9"/>

  <!-- "MA" monogram bottom-left, subtle -->
  <text
    x="52"
    y="468"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="#00ff88"
    opacity="0.18"
    letter-spacing="2"
  >MA</text>
</svg>
