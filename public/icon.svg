<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0a0a0a"/>

  <!-- Chart line -->
  <polyline
    points="60,340 140,260 200,300 280,160 360,200 440,100"
    fill="none"
    stroke="#00ff88"
    stroke-width="22"
